<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";line-height:1.6;color:#1f2328;background:#ffffff}
a{color:#0969da;text-decoration:none}
a:hover{text-decoration:underline}
/* Sidebar */
.sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:#f6f8fa;border-right:1px solid #d0d7de;overflow-y:auto;z-index:30;padding:16px 0 80px 0;transition:transform .25s ease;-webkit-overflow-scrolling:touch}
.sidebar.closed{transform:translateX(-100%)}
@media(min-width:1024px){.sidebar{transform:none!important}}
.sidebar-header{padding:0 16px 12px;border-bottom:1px solid #d0d7de;margin-bottom:8px}
.sidebar-header h1{font-size:15px;font-weight:600;color:#1f2328}
.sidebar-nav{font-size:13px}
.nav-part{padding:4px 16px;font-weight:600;color:#656d76;text-transform:uppercase;font-size:11px;letter-spacing:.5px;margin-top:12px}
.nav-module{padding:2px 16px;font-weight:600;color:#1f2328;font-size:12px;margin-top:6px}
.nav-topic{display:flex;align-items:flex-start;padding:3px 16px 3px 24px;color:#1f2328;cursor:pointer;border-left:2px solid transparent;transition:all .12s ease;font-size:13px}
.nav-topic:hover{background:#eaeef2;text-decoration:none}
.nav-topic.active{background:#ddf4ff;border-left-color:#0969da;color:#0969da;font-weight:500}
.nav-topic-num{color:#656d76;margin-right:6px;min-width:18px;font-weight:500}
.nav-subtopic{padding:1px 16px 1px 40px;color:#656d76;cursor:pointer;font-size:12px;display:block}
.nav-subtopic:hover{color:#0969da;text-decoration:none}
.main{margin-left:280px;min-height:100vh}
@media(max-width:1023px){.main{margin-left:0}}
.topbar{position:sticky;top:0;z-index:20;background:#ffffff;border-bottom:1px solid #d0d7de;padding:10px 24px;display:flex;align-items:center;gap:12px}
.menu-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid #d0d7de;border-radius:6px;background:#f6f8fa;cursor:pointer;flex-shrink:0}
@media(min-width:1024px){.menu-btn{display:none}}
.menu-btn svg{width:18px;height:18px}
.topbar-title{font-size:14px;font-weight:600;color:#1f2328;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.content{padding:32px 48px 96px;max-width:900px;margin:0 auto}
@media(max-width:768px){.content{padding:24px 16px 64px}}
.markdown-body{font-size:16px;line-height:1.5;overflow-wrap:break-word}
.markdown-body::before{display:table;content:""}
.markdown-body::after{display:table;clear:both;content:""}
.markdown-body>*:first-child{margin-top:0!important}
.markdown-body>*:last-child{margin-bottom:0!important}
.markdown-body a:not([href]){color:inherit;text-decoration:none}
.markdown-body h1{font-size:2em;font-weight:600;margin:24px 0 16px;padding-bottom:.3em;border-bottom:1px solid #d1d9e0b3}
.markdown-body h2{font-size:1.5em;font-weight:600;margin:24px 0 16px;padding-bottom:.3em;border-bottom:1px solid #d1d9e0b3}
.markdown-body h3{font-size:1.25em;font-weight:600;margin:24px 0 16px}
.markdown-body h4{font-size:1em;font-weight:600;margin:24px 0 16px}
.markdown-body h5{font-size:.875em;font-weight:600;margin:24px 0 16px}
.markdown-body h6{font-size:.85em;font-weight:600;margin:24px 0 16px;color:#59636e}
.markdown-body img{max-width:100%;box-sizing:content-box;border-style:none}
.markdown-body p{margin:0 0 10px}
.markdown-body ul,.markdown-body ol{margin:0 0 0;padding-left:2em}
.markdown-body li+li{margin-top:.25em}
.markdown-body ul ul,.markdown-body ul ol,.markdown-body ol ol,.markdown-body ol ul{margin-top:0;margin-bottom:0}
.markdown-body li>p{margin-top:16px}
.markdown-body code{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;background:#818b981f;padding:.2em .4em;border-radius:6px;font-size:85%;white-space:break-spaces}
.markdown-body pre{background:#f6f8fa;padding:16px;border-radius:6px;overflow-x:auto;margin:0 0 16px;line-height:1.45;font-size:85%}
.markdown-body pre code{display:inline;padding:0;margin:0;overflow:visible;line-height:inherit;word-wrap:normal;background:transparent;border:0;font-size:100%;color:inherit}
.markdown-body table{border-spacing:0;border-collapse:collapse;width:max-content;max-width:100%;margin:0 0 16px;display:block;overflow-x:auto;font-variant:tabular-nums}
.markdown-body th,.markdown-body td{border:1px solid #d1d9e0;padding:6px 13px;text-align:left}
.markdown-body th{background:#f6f8fa;font-weight:600}
.markdown-body tr{border-top:1px solid #d1d9e0b3}
.markdown-body tr:nth-child(2n){background:#f6f8fa}
.markdown-body blockquote{margin:0 0 16px;padding:0 1em;color:#59636e;border-left:.25em solid #d1d9e0}
.markdown-body blockquote p{margin-bottom:8px}
.markdown-body blockquote>:first-child{margin-top:0}
.markdown-body blockquote>:last-child{margin-bottom:0}
.markdown-body hr{height:.25em;padding:0;margin:24px 0;background:#d1d9e0;border:0}
.markdown-body strong{font-weight:600}
.heading-anchor{float:left;padding-right:.25em;margin-left:-20px;line-height:1;color:#59636e;opacity:0;transition:opacity .2s;text-decoration:none}
h1:hover .heading-anchor,h2:hover .heading-anchor,h3:hover .heading-anchor,h4:hover .heading-anchor{opacity:1}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:25}
.sidebar-overlay.show{display:block}
@media(max-width:1023px){

  .nav-topic{padding:6px 16px 6px 24px}
  .nav-subtopic{padding:4px 16px 4px 40px}

@media(min-width:1024px){.sidebar-overlay{display:none!important}}
.search-box{position:relative;padding:0 16px 8px}
.search-box input{width:100%;padding:5px 10px;font-size:13px;border:1px solid #d0d7de;border-radius:6px;background:#ffffff;outline:none}
.search-box input:focus{border-color:#0969da;box-shadow:0 0 0 2px rgba(9,105,218,.15)}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:#d0d7de;border-radius:3px}
@media(prefers-color-scheme:dark){
  .markdown-body{color:#f0f6fc}
  .markdown-body h1,.markdown-body h2{border-bottom-color:#3d444db3}
  .markdown-body h6{color:#9198a1}
  .markdown-body blockquote{color:#9198a1;border-left-color:#3d444d}
  .markdown-body hr{background:#3d444d}
  .markdown-body code{background:#656c7633}
  .markdown-body pre{background:#151b23}
  .markdown-body th,.markdown-body td{border-color:#3d444d}

  .markdown-body tr{border-top-color:#3d444db3}
  .markdown-body tr:nth-child(2n){background:#151b23}
  .heading-anchor{color:#9198a1}
}

<body x-data="docNav" x-init="init()" @keydown.window.escape="sidebarOpen=false" :class="sidebarOpen ? 'sidebar-open' : ''">

<div class="sidebar-overlay" :class="{show:sidebarOpen}" @click="sidebarOpen=false"></div>

<aside class="sidebar" :class="{closed:!sidebarOpen}" id="sidebar">
  <div class="sidebar-header">
    <h1>Go Master-Class Guide</h1>
  </div>
  <div class="search-box">
    <input type="text" placeholder="Filter topics..." x-model="search" @input="filterTopics">
  </div>
  <nav class="sidebar-nav">
    <template x-for="part in filteredParts" :key="part.id">
      <div>
        <div class="nav-part" x-text="part.title"></div>
        <template x-for="mod in part.modules" :key="mod.id">
          <div>
            <div class="nav-module" x-text="mod.title"></div>
            <template x-for="topic in mod.topics" :key="topic.id">
              <div>
                <a class="nav-topic" :class="{active:activeTopic===topic.id}" :href="'#'+topic.id" @click.prevent="scrollTo(topic.id)">
                  <span class="nav-topic-num" x-text="topic.number+'.'"></span>
                  <span x-text="topic.title"></span>
                </a>
                <template x-for="sub in topic.subtopics" :key="sub.id">
                  <a class="nav-subtopic" :href="'#'+sub.id" @click.prevent="scrollTo(sub.id)" x-text="sub.title"></a>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>
  </nav>
</aside>

<div class="main">
  <header class="topbar">
    <button class="menu-btn" @click="sidebarOpen=!sidebarOpen" aria-label="Toggle menu">

    </button>
    <span class="topbar-title" x-text="pageTitle">Go Programming: The Master-Class Guide</span>
  </header>
  <article class="content markdown-body" id="markdown-body" x-html="renderedHTML"></article>
</div>

    renderMarkdown(md) {
      if (typeof marked === "undefined") return "<p style='text-align:center;padding:40px'>Loading markdown parser...</p>";
      marked.setOptions({ gfm: true, breaks: false, headerIds: true, mangle: false });
      const renderer = new marked.Renderer();
      const self = this;
      renderer.heading = function(text, level, raw) {
        let id = raw.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
        const m = raw.match(/^(\d+)\.\s+(.+)/);
        if (m && level === 3) id = "topic-" + m[1];
        const anchor = '<a class="heading-anchor" href="#' + id + '">#</a>';
        return '<h' + level + ' id="' + id + '" style="position:relative">' + anchor + text + '</h' + level + '>';
      };
      renderer.code = function(code, lang) {
        const cls = lang ? ' class="language-' + lang + '"' : '';
        return '<pre><code' + cls + '>' + code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") + '</code></pre>';
      };
      renderer.link = function(href, title, text) {
        const target = /^https?:\/\//.test(href) ? ' target="_blank" rel="noopener"' : '';
        const t = title ? ' title="' + title + '"' : '';
        return '<a href="' + href + '"' + target + t + '>' + text + '</a>';
      };
      renderer.table = function(header, body) {
        return '<div style="overflow-x:auto"><table>' + header + body + '</table></div>';
      };
      return marked.parse(md, { renderer });
    },

    highlightCode() {
      if (typeof Prism !== "undefined") {
        document.querySelectorAll("#markdown-body pre code").forEach(b => Prism.highlightElement(b));
      }
    },

    scrollTo(id) {
      if (id.startsWith("topic-")) this.activeTopic = id;
      else {
        const parts = id.split("-");
        for (const p of parts) { if (/^\d+$/.test(p)) { this.activeTopic = "topic-" + p; break; } }
      }
      if (window.innerWidth < 1024) this.sidebarOpen = false;
      const el = document.getElementById(id);
      if (el) {
        el.scrollIntoView({behavior:"smooth",block:"start"});
        history.pushState(null, "", "#" + id);
      }
    },

    observeScroll() {
      const observer = new IntersectionObserver(
        (entries) => {
          for (const e of entries) {
            if (e.isIntersecting && e.target.id.startsWith("topic-")) {
              this.activeTopic = e.target.id;
            }
          }
        },
        { rootMargin: "-80px 0px -70% 0px", threshold: 0 }
      );
      this.$nextTick(() => {
        document.querySelectorAll("h3[id^='topic-']").forEach(h => observer.observe(h));
      });
    },

    filterTopics() {
      const q = this.search.toLowerCase().trim();
      if (!q) { this.filteredParts = this.navData; return; }
      this.filteredParts = this.navData.map(part => ({
        ...part,
        modules: part.modules.map(mod => ({
          ...mod,
          topics: mod.topics.filter(t =>
            t.number.includes(q) ||
            t.title.toLowerCase().includes(q) ||
            t.subtopics.some(s => s.title.toLowerCase().includes(q))
          )
        })).filter(mod => mod.topics.length > 0)
      })).filter(part => part.modules.length > 0);
    }
  }));
});
