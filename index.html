<script>
  (function() {
    const stored = localStorage.getItem('theme');
    const theme = stored === 'dark' || stored === 'light'
      ? stored
      : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);

    const prismLink = document.createElement('link');
    prismLink.rel = 'stylesheet';
    prismLink.href = theme === 'dark'
      ? 'https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css'
      : 'https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css';
    document.head.appendChild(prismLink);
  })();
</script>

<script>function b64ToUtf8(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

document.addEventListener("alpine:init", () => {
  Alpine.data("docNav", () => ({
    sidebarOpen: false,
    search: "",
    activeTopic: "",
    activeModuleId: "",
    pageTitle: "Go Programming: The Master-Class Guide",
    renderedHTML: "<p style='text-align:center;padding:40px;color:#656d76'>Loading documentation...</p>",
    navData: NAV_DATA,
    filteredParts: NAV_DATA,
    theme: (function() {
      const stored = localStorage.getItem('theme');
      if (stored === 'dark' || stored === 'light') return stored;
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    })(),

    init() {
      this.determineActiveModule();
      setTimeout(() => this.loadModule(this.activeModuleId), 0);
      this.applyTheme();
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem('theme')) {
          this.theme = e.matches ? 'dark' : 'light';
          this.applyTheme();
        }
      });
      window.addEventListener("popstate", () => {
        const id = window.location.hash ? window.location.hash.slice(1) : "";
        if (id && TOPIC_TO_MODULE[id]) {
          this.loadModule(TOPIC_TO_MODULE[id]);
        } else if (id.startsWith("module-")) {
          this.loadModule(id);
        }
      });
    },

    determineActiveModule() {
      const id = window.location.hash ? window.location.hash.slice(1) : "";
      if (id && TOPIC_TO_MODULE[id]) {
        this.activeModuleId = TOPIC_TO_MODULE[id];
      } else if (id.startsWith("module-")) {
        this.activeModuleId = id;
      } else {
        this.activeModuleId = "module-1-the-environment-syntax-basics";
      }
    },

    loadModule(moduleId) {
      if (!moduleId || !MODULES_CONTENT[moduleId]) {
        moduleId = "module-1-the-environment-syntax-basics";
      }
      this.activeModuleId = moduleId;

      const hashId = window.location.hash ? window.location.hash.slice(1) : "";
      const keepHash = hashId && (TOPIC_TO_MODULE[hashId] === moduleId || hashId === moduleId);

      try {
        const md = b64ToUtf8(MODULES_CONTENT[moduleId]);
        this.renderedHTML = this.renderMarkdown(md);
        this.$nextTick(() => {
          this.highlightCode();
          this.observeScroll();
          if (keepHash) {
            const el = document.getElementById(hashId);
            if (el) el.scrollIntoView({behavior:"smooth",block:"start"});
            if (hashId.startsWith("topic-")) this.activeTopic = hashId;
          } else {
            window.scrollTo({top: 0, behavior: "auto"});
            history.replaceState(null, "", "#" + moduleId);
          }
        });
      } catch (e) {
        this.renderedHTML = "<p style='text-align:center;padding:40px;color:#cf222e'>Failed to render documentation. Check the browser console.</p>";
        console.error(e);
      }
    },

    toggleTheme() {
      this.theme = this.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', this.theme);
      this.applyTheme();
    },

    applyTheme() {
      document.documentElement.setAttribute('data-theme', this.theme);
      const existing = document.querySelector('link[data-prism-theme]');
      if (existing) existing.remove();
      const prismLink = document.createElement('link');
      prismLink.setAttribute('data-prism-theme', this.theme);
      prismLink.rel = 'stylesheet';
      prismLink.href = this.theme === 'dark'
        ? 'https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css'
        : 'https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css';
      document.head.appendChild(prismLink);
    },

    renderMarkdown(md) {
      if (typeof marked === "undefined") return "<p style='text-align:center;padding:40px'>Loading markdown parser...</p>";
      marked.setOptions({ gfm: true, breaks: false, headerIds: true, mangle: false });
      const renderer = new marked.Renderer();
      renderer.heading = function(text, level, raw) {
        let id = raw.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
        const m = raw.match(/^(\d+)\.\s+(.+)/);
        if (m && level === 3) id = "topic-" + m[1];
        const anchor = '<a class="heading-anchor" href="#' + id + '">#</a>';
        return '<h' + level + ' id="' + id + '" style="position:relative">' + anchor + text + '</h' + level + '>';
      };
      renderer.code = function(code, lang) {
        const cls = lang ? ' class="language-' + lang + '"' : '';
        return '<pre><code' + cls + '>' + code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") + '</code></pre>';
      };
      renderer.link = function(href, title, text) {
        const target = /^https?:\/\//.test(href) ? ' target="_blank" rel="noopener"' : '';
        const t = title ? ' title="' + title + '"' : '';
        return '<a href="' + href + '"' + target + t + '>' + text + '</a>';
      };
      renderer.table = function(header, body) {
        return '<div style="overflow-x:auto"><table>' + header + body + '</table></div>';
      };
      return marked.parse(md, { renderer });
    },

    highlightCode() {
      if (typeof Prism !== "undefined") {
        document.querySelectorAll("#markdown-body pre code").forEach(b => Prism.highlightElement(b));
      }
    },

    scrollTo(id) {
      const targetModule = TOPIC_TO_MODULE[id];
      if (targetModule && targetModule !== this.activeModuleId) {
        history.pushState(null, "", "#" + id);
        this.loadModule(targetModule);
        return;
      }
      if (id.startsWith("module-")) {
        history.pushState(null, "", "#" + id);
        this.loadModule(id);
        return;
      }
      if (id.startsWith("topic-")) this.activeTopic = id;
      else {
        const parts = id.split("-");
        for (const p of parts) { if (/^\d+$/.test(p)) { this.activeTopic = "topic-" + p; break; } }
      }
      if (window.innerWidth < 1024) this.sidebarOpen = false;
      const el = document.getElementById(id);
      if (el) {
        el.scrollIntoView({behavior:"smooth",block:"start"});
        history.pushState(null, "", "#" + id);
      }
    },

    observeScroll() {
      const observer = new IntersectionObserver(
        (entries) => {
          for (const e of entries) {
            if (e.isIntersecting && e.target.id.startsWith("topic-")) {
              this.activeTopic = e.target.id;
            }
          }
        },
        { rootMargin: "-80px 0px -70% 0px", threshold: 0 }
      );
      this.$nextTick(() => {
        document.querySelectorAll("h3[id^='topic-']").forEach(h => observer.observe(h));
      });
    },

    filterTopics() {
      const q = this.search.toLowerCase().trim();
      if (!q) { this.filteredParts = this.navData; return; }
      this.filteredParts = this.navData.map(part => ({
        ...part,
        modules: part.modules.map(mod => ({
          ...mod,
          topics: mod.topics.filter(t =>
            t.number.includes(q) ||
            t.title.toLowerCase().includes(q) ||
            t.subtopics.some(s => s.title.toLowerCase().includes(q))
          )
        })).filter(mod => mod.topics.length > 0)
      })).filter(part => part.modules.length > 0);
    },

    get prevModule() {
      const keys = Object.keys(MODULE_TITLES);
      const idx = keys.indexOf(this.activeModuleId);
      if (idx <= 0) return null;
      const id = keys[idx - 1];
      return { id, title: MODULE_TITLES[id] };
    },

    get nextModule() {
      const keys = Object.keys(MODULE_TITLES);
      const idx = keys.indexOf(this.activeModuleId);
      if (idx < 0 || idx >= keys.length - 1) return null;
      const id = keys[idx + 1];
      return { id, title: MODULE_TITLES[id] };
    }
  }));
});
</script>
